<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои счета | GosKom</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="login-container" style="max-width: 700px;">
    <h2>Счета пользователя: <span th:text="${userName}">Имя</span></h2>

    <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd;">
        <h3>Выставить новый счет</h3>
        <form th:action="@{/api/bills/add}" method="post">
            <input type="text" name="title" placeholder="Название услуги (напр. Свет)" required style="margin-bottom: 10px; width: 95%;">
            <input type="number" step="0.01" name="amount" placeholder="Сумма" required style="margin-bottom: 10px; width: 95%;">
            <button type="submit" style="background-color: #27ae60;">Добавить счет</button>
        </form>
    </div>

    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="background-color: #34495e; color: white;">
                <th style="padding: 10px;">Услуга</th>
                <th style="padding: 10px;">Сумма</th>
                <th style="padding: 10px;">Статус</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="bill : ${bills}" style="border-bottom: 1px solid #ddd;">
                <td style="padding: 10px;" th:text="${bill.title}">Услуга</td>
                <td style="padding: 10px;" th:text="${bill.amount + ' ₽'}">0.00</td>
                <td style="padding: 10px;">
                    <span th:if="${bill.isPaid}" style="color: green; font-weight: bold;">Оплачено</span>
                    <span th:unless="${bill.isPaid}" style="color: #e74c3c; font-weight: bold;">К оплате</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(bills)}">
                <td colspan="3" style="text-align: center; padding: 20px;">Счетов пока нет.</td>
            </tr>
        </tbody>
    </table>

    <div style="margin-top: 20px; text-align: center;">
        <a th:href="@{/profile}" class="reg-link">Назад в профиль</a>
    </div>
</div>

</body>
</html>
