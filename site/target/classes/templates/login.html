<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход | GosKom</title>
    <style>
        /* Добавим немного стилей для аккуратности */
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .login-container { width: 300px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        input { width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        .reg-link { margin-top: 15px; text-align: center; display: block; color: #007bff; text-decoration: none; font-size: 0.9em; }
        .reg-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Вход в GosKom</h2>

    <div th:if="${error}" style="color: red; margin-bottom: 10px;">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/login}" method="post">
        <label>Email:</label>
        <input type="email" name="email" required />

        <label>Пароль:</label>
        <input type="password" name="password" required />

        <button type="submit">Войти</button>
    </form>

    <a class="reg-link" th:href="@{/register}">Нет аккаунта? Зарегистрироваться</a>
</div>

</body>
</html>
